<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello from External Repo!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes wave {
    0%, 60%, 100% { transform: rotate(0deg); }
    10%, 30%      { transform: rotate(14deg); }
    20%           { transform: rotate(-8deg); }
    40%           { transform: rotate(-4deg); }
    50%           { transform: rotate(10deg); }
  }

  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position:  200% center; }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: linear-gradient(120deg, #667eea, #764ba2, #f093fb, #4facfe);
    background-size: 300% 300%;
    animation: gradientShift 14s ease infinite;
    overflow: hidden;
  }

  .card {
    max-width: 640px;
    width: 100%;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 20px;
    padding: 56px 44px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    animation: float 6s ease-in-out infinite;
  }

  h1 {
    font-size: 36px;
    font-weight: 800;
    margin-bottom: 18px;
    letter-spacing: -0.02em;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.15s forwards;
    background: linear-gradient(90deg, #fff 20%, #ffe9a8 40%, #fff 60%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: fadeUp 0.9s ease 0.15s forwards, shimmer 4s linear 1s infinite;
  }

  .wave-emoji {
    display: inline-block;
    transform-origin: 70% 70%;
    animation: wave 2.4s ease-in-out 1.2s infinite;
    -webkit-text-fill-color: initial;
  }

  p {
    font-size: 17px;
    line-height: 1.75;
    color: rgba(255, 255, 255, 0.92);
    opacity: 0;
    animation: fadeUp 0.9s ease 0.45s forwards;
  }

  .meta {
    margin-top: 36px;
    padding-top: 22px;
    border-top: 1px solid rgba(255, 255, 255, 0.25);
    font-size: 13px;
    color: rgba(255, 255, 255, 0.75);
    opacity: 0;
    animation: fadeUp 0.9s ease 0.75s forwards;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Hello from External Repo<span class="wave-emoji"> 👋</span></h1>
    <p>이 페이지는 GitHub 외부 리포지토리(<strong>amonware/test</strong>)에서 commit이 발생하면 Cafe24 AI Hosting이 자동으로 재배포하도록 연결되어 있습니다. 그라데이션 배경, 페이드 업, 흔드는 손, 텍스트 시머 — 모두 CSS만 사용했습니다.</p>
    <div class="meta">Animated · CSS only · auto-redeployed via aispace-dev MCP</div>
  </div>
</body>
</html>
